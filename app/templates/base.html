<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🤖 Agente Social Multiplataforma</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-md-3">
          <!-- Barra lateral fija -->
          <div class="card">
            <div class="card-header bg-primary text-white">📊 Estado</div>
            <ul class="list-group list-group-flush" id="status-list">
              <li class="list-group-item">
                🔑 API Key:
                <span id="api-status">No configurada</span>
              </li>
              <li class="list-group-item">
                📱 Plataforma:
                <span id="platform-status">Ninguna</span>
              </li>
              <li class="list-group-item">
                👤 Cuenta:
                <span id="account-status">Ninguna</span>
              </li>
              <li class="list-group-item">
                ⏱️ Intervalo:
                <span id="interval-status">-</span>
              </li>
              <li class="list-group-item">
                🔄 Programador:
                <span id="scheduler-status">Inactivo</span>
              </li>
            </ul>
          </div>
          <div class="mt-3 d-grid gap-2">
            <button class="btn btn-outline-primary" onclick="loadPage('config')">
              ⚙️ Configuración
            </button>
            <button class="btn btn-outline-primary" onclick="loadPage('platforms')">
              📡 Plataformas
            </button>
            <button class="btn btn-outline-primary" onclick="loadPage('publish')">
              ✏️ Publicar
            </button>
            <button class="btn btn-outline-primary" onclick="loadPage('schedule')">
              ⏰ Programar
            </button>
          </div>
        </div>
        <div class="col-md-9">
          <div id="content-area">
            {% block content %}
            <div class="alert alert-info">Selecciona una opción del menú lateral.</div>
            {% endblock %}
          </div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
