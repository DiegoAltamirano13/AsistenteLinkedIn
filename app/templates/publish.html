<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Publicar - Agente Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container py-4">
      <h2>✏️ Publicar contenido manual</h2>
      <div class="card">
        <div class="card-body">
          <div class="mb-3">
            <label class="form-label">Texto</label>
            <textarea
              class="form-control"
              id="publishText"
              rows="4"
              placeholder="Escribe tu mensaje"
            ></textarea>
          </div>
          <div class="mb-3">
            <label class="form-label">O generar con IA</label>
            <div class="input-group">
              <input type="text" class="form-control" id="aiPrompt" placeholder="Prompt para IA" />
              <button class="btn btn-outline-secondary" onclick="generateText()">
                Generar texto
              </button>
            </div>
          </div>
          <div class="mb-3">
            <button class="btn btn-outline-primary" onclick="fetchNews()">📰 Cargar noticia</button>
            <button class="btn btn-outline-primary" onclick="fetchMeme()">🖼️ Cargar meme</button>
            <button class="btn btn-outline-primary" onclick="fetchEvent()">📅 Cargar evento</button>
          </div>
          <div class="mb-3">
            <label class="form-label">Imagen (opcional)</label>
            <input type="file" class="form-control" id="imageFile" accept="image/*" />
            <button class="btn btn-outline-secondary mt-2" onclick="generateImage()">
              🎨 Generar imagen por IA
            </button>
            <div id="imagePreview" class="mt-2"></div>
          </div>
          <button class="btn btn-success" onclick="doPublish()">📤 Publicar</button>
          <a href="/" class="btn btn-secondary">Volver</a>
          <div id="publishResult" class="mt-3"></div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function generateText() {
        const prompt = $('#aiPrompt').val();
        if (!prompt) return alert('Escribe un prompt');
        $.ajax({
          url: '/api/generate_text',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ prompt }),
          success: function (data) {
            if (data.text) {
              $('#publishText').val(data.text);
            } else {
              alert('Error: ' + data.error);
            }
          },
        });
      }

      function generateImage() {
        const prompt = $('#aiPrompt').val();
        if (!prompt) return alert('Escribe un prompt');
        $.ajax({
          url: '/api/generate_image',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ prompt }),
          success: function (data) {
            if (data.image_path) {
              $('#imagePreview').html(
                `<img src="/${data.image_path}" class="preview-image" style="max-width:100%;max-height:300px;">`,
              );
            } else {
              alert('Error: ' + data.error);
            }
          },
        });
      }

      function fetchNews() {
        $.get('/api/news', function (data) {
          if (data.error) {
            alert('Error: ' + data.error);
            return;
          }
          if (data.length > 0) {
            const item = data[0];
            $('#publishText').val(
              `${item.title}\n${item.summary}\nFuente: ${item.source}\n${item.link}`,
            );
          } else {
            alert('No se encontraron noticias');
          }
        });
      }

      function fetchMeme() {
        $.get('/api/meme', function (data) {
          if (data.error) {
            alert('Error: ' + data.error);
            return;
          }
          if (data.meme_path) {
            $('#imagePreview').html(
              `<img src="/${data.meme_path}" class="preview-image" style="max-width:100%;max-height:300px;">`,
            );
            $('#publishText').val('¡Meme del día! 😂');
          }
        });
      }

      function fetchEvent() {
        $.get('/api/events', function (data) {
          if (data.error) {
            alert('Error: ' + data.error);
            return;
          }
          if (data.length > 0) {
            const ev = data[0];
            $('#publishText').val(`📅 ${ev.summary}\n📆 ${ev.start}\n🔗 ${ev.link}`);
          } else {
            alert('No hay eventos próximos');
          }
        });
      }

      function doPublish() {
        const text = $('#publishText').val();
        if (!text) return alert('Escribe un texto');
        // Aquí se podría subir imagen, pero por simplicidad solo texto
        $.ajax({
          url: '/api/publish',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ text }),
          success: function (data) {
            if (data.status === 'ok') {
              $('#publishResult').html(
                '<div class="alert alert-success">✅ Publicado correctamente</div>',
              );
            } else {
              $('#publishResult').html(
                '<div class="alert alert-danger">❌ Error: ' + data.error + '</div>',
              );
            }
          },
        });
      }
    </script>
  </body>
</html>
