<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🤖 Agente Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container-fluid py-4">
      <div class="row">
        <div class="col-md-12">
          <h1 class="text-center mb-4">🤖 Agente Social Multiplataforma</h1>
        </div>
      </div>
      <div class="row">
        <div class="col-md-3">
          <div class="card">
            <div class="card-header bg-primary text-white">📊 Estado</div>
            <ul class="list-group list-group-flush" id="status-list">
              <li class="list-group-item">
                🔑 API Key:
                <span id="api-status">No configurada</span>
              </li>
              <li class="list-group-item">
                📱 Plataforma:
                <span id="platform-status">Ninguna</span>
              </li>
              <li class="list-group-item">
                👤 Cuenta:
                <span id="account-status">Ninguna</span>
              </li>
              <li class="list-group-item">
                ⏱️ Intervalo:
                <span id="interval-status">-</span>
              </li>
              <li class="list-group-item">
                🔄 Programador:
                <span id="scheduler-status">Inactivo</span>
              </li>
            </ul>
          </div>
          <div class="mt-3 d-grid gap-2">
            <a href="/config" class="btn btn-outline-primary">⚙️ Configuración</a>
            <a href="/publish" class="btn btn-outline-primary">✏️ Publicar</a>
            <a href="/schedule" class="btn btn-outline-primary">⏰ Programar</a>
          </div>
        </div>
        <div class="col-md-9">
          <div class="alert alert-info">Bienvenido. Selecciona una opción del menú lateral.</div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function updateStatus() {
        $.get('/api/config', function (data) {
          $('#api-status').text(data.api_key ? '✅ Configurada' : '❌ No configurada');
          $('#platform-status').text(data.platform_id || 'Ninguna');
          $('#account-status').text(data.account_name || data.account_id || 'Ninguna');
          $('#interval-status').text(data.interval_hours + ' horas');
        });
      }
      $(document).ready(updateStatus);
    </script>
  </body>
</html>
