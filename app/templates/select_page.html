<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seleccionar página - Agente Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card">
        <div class="card-header bg-primary text-white">
          <i class="fas fa-edit"></i>
          Seleccionar página para {{ platform }}
        </div>
        <div class="card-body">
          {% if error %}
          <div class="alert alert-warning">{{ error }}</div>
          {% endif %}
          <p>Introduce el ID de la página que quieres usar para publicar en {{ platform }}.</p>
          <form method="POST" action="/select-page">
            <input type="hidden" name="platform" value="{{ platform }}" />
            <input type="hidden" name="tempToken" value="{{ temp_token }}" />
            <input type="hidden" name="connectToken" value="{{ connect_token }}" />
            <div class="mb-3">
              <label for="pageId" class="form-label">ID de la página</label>
              <input
                type="text"
                class="form-control"
                id="pageId"
                name="pageId"
                placeholder="Ej: 123456789"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary">Seleccionar y conectar</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
