<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Programar - Agente Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <div class="container py-4">
      <h2>⏰ Programación automática</h2>
      <div class="card">
        <div class="card-body">
          <p>
            Intervalo actual:
            <strong id="currentInterval">{{ config.interval_hours or 1 }}</strong>
            horas
          </p>
          <div class="input-group mb-3">
            <input
              type="number"
              class="form-control"
              id="newInterval"
              value="{{ config.interval_hours or 1 }}"
            />
            <button class="btn btn-outline-secondary" onclick="changeInterval()">
              Cambiar intervalo
            </button>
          </div>
          <button class="btn btn-success" onclick="startScheduler()">▶️ Iniciar programador</button>
          <button class="btn btn-danger" onclick="stopScheduler()">⏹️ Detener</button>
          <a href="/" class="btn btn-secondary">Volver</a>
          <div id="schedulerStatus" class="mt-3"></div>
        </div>
      </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
      function startScheduler() {
        const interval = parseInt($('#newInterval').val()) || 1;
        $.ajax({
          url: '/api/schedule',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ action: 'start', interval_hours: interval }),
          success: function (data) {
            if (data.status === 'started' || data.status === 'already_running') {
              $('#schedulerStatus').html(
                '<div class="alert alert-success">✅ Programador iniciado</div>',
              );
              $('#currentInterval').text(interval);
            } else {
              $('#schedulerStatus').html(
                '<div class="alert alert-danger">❌ Error: ' + data.error + '</div>',
              );
            }
          },
        });
      }

      function stopScheduler() {
        $.ajax({
          url: '/api/schedule',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ action: 'stop' }),
          success: function (data) {
            if (data.status === 'stopped') {
              $('#schedulerStatus').html(
                '<div class="alert alert-warning">⏹️ Programador detenido</div>',
              );
            } else {
              $('#schedulerStatus').html(
                '<div class="alert alert-info">ℹ️ ' + data.status + '</div>',
              );
            }
          },
        });
      }

      function changeInterval() {
        const interval = parseInt($('#newInterval').val()) || 1;
        $.ajax({
          url: '/api/schedule',
          method: 'POST',
          contentType: 'application/json',
          data: JSON.stringify({ action: 'change_interval', interval_hours: interval }),
          success: function (data) {
            if (data.status === 'interval_changed') {
              $('#schedulerStatus').html(
                '<div class="alert alert-success">✅ Intervalo cambiado a ' +
                  interval +
                  ' horas</div>',
              );
              $('#currentInterval').text(interval);
            } else {
              $('#schedulerStatus').html(
                '<div class="alert alert-info">ℹ️ ' + data.status + '</div>',
              );
            }
          },
        });
      }
    </script>
  </body>
</html>
