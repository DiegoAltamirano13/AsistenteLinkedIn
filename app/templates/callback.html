<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conexión - Agente Social</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="card">
        <div
          class="card-header {% if success %}bg-success{% else %}bg-danger{% endif %} text-white"
        >
          {% if success %}✅ Conexión exitosa{% else %}❌ Error de conexión{% endif %}
        </div>
        <div class="card-body">
          {% if success %}
          <p>{{ message }}</p>
          <p>Puedes cerrar esta ventana y volver a la aplicación.</p>
          <script>
            setTimeout(() => window.close(), 3000);
          </script>
          {% else %}
          <p>
            <strong>Error:</strong>
            {{ error }}
          </p>
          <p>Por favor, cierra esta ventana e intenta de nuevo.</p>
          {% endif %}
          <button class="btn btn-secondary" onclick="window.close()">Cerrar</button>
        </div>
      </div>
    </div>
  </body>
</html>
