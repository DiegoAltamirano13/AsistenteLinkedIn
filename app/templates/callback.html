<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conectando...</title>
    <style>
      body {
        background: #0f0a1a;
        color: #e2e8f0;
        font-family: 'Segoe UI', sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
      }
      .spinner {
        border: 4px solid rgba(255, 255, 255, 0.1);
        border-top: 4px solid #6c3ce1;
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <h2>🔄 Conectando tu cuenta...</h2>
    <div class="spinner"></div>
    <p style="color: #94a3b8; margin-top: 20px">Esto puede tomar unos segundos.</p>
    <script>
      // Esta página se cierra automáticamente y recarga la configuración
      setTimeout(() => {
        window.close();
        window.opener.location.reload();
      }, 2000);
    </script>
  </body>
</html>
